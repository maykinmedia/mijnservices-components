name: CI

on:
  push:
    branches: [main]
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

jobs:
  format:
    name: Prettier check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
      - run: pnpm install
      - run: pnpm format:check

  publish:
    name: Build and publish to NPM
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://www.npmjs.com/package/@mijnservices/plan-card
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm
      - run: pnpm install
      - run: pnpm build
      - name: Publish to NPM
        if: startsWith(github.ref, 'refs/tags/')
        run: pnpm --filter @mijnservices/plan-card publish --access public --no-git-checks
